[package]
name = "filterway"
version = "0.1.0"
edition = "2021"
description = "Filter/modify Wayland messages from clients"
readme = "README.md"
repository = "https://github.com/powerman/filterway"
license = "MIT"

[dependencies]
aargvark = "0.7"
defer = "0.2"
libc = "0.2"
sd-notify = "0.4"
rustix = { version = "0.38", features = ["fs"] }

[dev-dependencies]
tempfile = "3"
