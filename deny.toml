[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained = "warn"
notice = "warn"
ignore = []

[licenses]
unlicensed = "deny"
allow-osi-fsl-free = "neither"
default = "deny"
confidence = 0.8
allow = [
    "MIT",
    "ISC",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
]

[[licenses.clarify]]
name = "andrewbaxter-license"
expression = "ISC"
license-files = [{ path = "andrewbaxter-license.txt", hash = 0 }]

[bans]
multiple-versions = "deny"
wildcards = "allow"
highlight = "all"
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
